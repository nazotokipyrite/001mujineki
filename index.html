<template id="0108">
<h2>0108</h2>
<p>
　あなたは受話器を取り、内線『0108』を入力した。<br>
　コール音が鳴り、数十秒ののち、誰が電話を取った。<br>
「はいー？」<br>
　眠たそうな声の、男の返事だ。<br>
「あの……交通系ICで乗車してしまって」<br>
「はあ……」<br>
「駅から出るのに、駅員さんに電話しなきゃダメって書いてあったので」<br>
「あの、それ来月からですよ？」<br>
「え？」<br>
「正常に動くと思いますけど？　そのままもう一回通ってみてください。ダメならそっち行きますんで」<br>
　駅員らしき男は、かなりいらだった様子で電話を強く切った。<br>
　あなたは、そんな馬鹿な、と思いながら、受話器を置いて、ICカードを片手に再び改札を通る。<br>
<br>
　ピーン、と軽い音がして、ゲートが開いた。<br>
「は？」<br>
　あなたは思わずそう声を漏らして振り返る。その向こう側、さっきあなたが電話をしていたところに、あなたの胸ほどの背丈の女の子が立っていた。顔は逆光で暗くなっているはずなのに、真っ赤な三日月上の口がきつく結ばれているのが分かった。<br>
<br>
<span style="color:red;">『いっちゃだめ』</span><br>
<br>
　体の芯に冷たく響くような声が、あなたの全身を貫く。まばたきをした瞬間に、彼女の姿は消えていた。<br>
　あなたは駅舎に背を向けて外に出る。スマホを取り出すまでもなく、外のタクシープールには一台のタクシーが止まっていた。あなたが出てくるのを見越していたかのように、ドアが開く。あなたはそこに乗り込んで、自宅の住所を告げた。<br>
　タクシー運転手は、あーい、と気の抜けた返事をする。<br>
「シートベルト」<br>
　あなたがシートベルトを締めると、男は気怠そうに「隣のお嬢さんもね」と言った。<br>
　あなたが反論する前に、タクシーは暗闇の田舎の村を、どこかに向かって走り始めた。<br>
</p>
<div  style="text-align:right;">
（無人駅からの脱出　END1　いっちゃだめ）

<p>　あなたは内線番号を押そうと受話器を取り、導き出した答え『9412』を順に入力していく。どこかにダイヤルが発信された。<br>

</br>

</br>

</br>

　どうやら、何かが間違っているらしい。</br>
　あなたは、受話器を置いて、再び謎に向かい合うことにした。</br></p>
